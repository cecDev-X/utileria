<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registra y de una vez Pags</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <h2>Formulario de Registro</h2>
        <form id="registroForm">
            <div class="form-group">
                <label>Nombre del Titular:</label>
                <input type="text" id="nombre" required>
                <span id="errorNombre" class="error"></span>
            </div>

            <div class="form-group">
                <label>Fecha de Nacimiento:</label>
                <input type="date" id="fechaNac" required>
                <span id="errorFecha" class="error"></span>
            </div>

            <div class="form-group">
                <label>Código de Seguridad (CVV - 3 o 4 dígitos):</label>
                <input type="number" id="cvv" required>
                <span id="errorCvv" class="error"></span>
            </div>

            <div class="form-group">
                <label>Número de Tarjeta VISA/MASTERCARD/AMEX:</label>
                <input type="text" id="tarjeta" required placeholder="0000 0000 0000 0000">
                <span id="errorTarjeta" class="error"></span>
            </div>

            <button type="submit">Registrar y Validar Tarjeta</button>
            <br><br>
            <a href="login.html">Ir al Login</a>
        </form>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Pago y Registro Exitoso</h3>
            <p id="mensajeModal"></p>
        </div>
    </div>

    <script src="js/utileria.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
